# Render blueprint (https://render.com/docs/blueprint-spec). Deploying is your step:
#   1. Push this repo to GitHub.
#   2. In Render: New > Blueprint, point it at the repo.
#   3. Set OPENROUTER_API_KEY and APP_PASSWORD (sync:false) in the dashboard.
#   4. BEFORE going live: set a hard prepaid credit cap on your OpenRouter account.
#
# Render has no standalone "bun" runtime — Bun ships bundled inside the `node`
# runtime, and the build/start commands invoke `bun` directly. (Verified against
# render.com/docs/blueprint-spec + bun.com/docs/guides/deployment/render, 2026-06.)
# BUN_VERSION pins the toolchain; Render's native default is 1.1.0, too old for
# this app (developed on 1.3.x).
#
# No Docker. The free instance spins down after ~15 min idle (~30-60s cold start)
# and has 512 MB / 0.1 CPU, which is fine for this I/O-bound app. `start` runs the
# production build (prod-server.ts), never dev mode.
services:
  - type: web
    name: j1m-agent
    runtime: node
    plan: free
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: BUN_VERSION
        value: "1.3.14"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
